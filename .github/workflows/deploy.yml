name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.131.0/hugo_extended_0.131.0_linux-amd64.deb
          sudo dpkg -i hugo_extended_0.131.0_linux-amd64.deb

      - name: Install Pagefind
        run: npm install -g pagefind

      - name: Build
        run: |
          rm -rf public/*
          hugo
          npx pagefind --site public

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
