name: Build and Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Switch submodule to main branch
        run: |
          cd public
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git checkout main
          git pull origin main

      - name: Install Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.131.0/hugo_extended_0.131.0_linux-amd64.deb
          sudo dpkg -i hugo_extended_0.131.0_linux-amd64.deb

      - name: Install Pagefind
        run: npm install -g pagefind

      - name: Build
        run: |
          rm -rf public/*
          hugo
          npx pagefind --site public

      - name: Deploy
        run: |
          cd public
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "deploy: auto build [skip ci]"
            git push
          fi
